# .github/workflows/deploy.yml
# Automatically builds and deploys the React frontend to GitHub Pages
# on every push to the main branch.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # also allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          # This tells the React app where the Railway API lives.
          # Set this secret in: GitHub repo → Settings → Secrets → Actions
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # GitHub Pages requires a 404.html that redirects to index.html
      # so that page refreshes on /tiger-library/ work correctly
      - name: Create 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
